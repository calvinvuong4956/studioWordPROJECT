<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crop-llage</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" defer></script>
    <script src="https://unpkg.com/konva@10/konva.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  </head>
  <body>
    <h1>Crop-llage</h1>

    <div id="workspace">
      <div id="cropperSection">
        <div id="cropperContainer">
          <img src="" id="croppedImage" alt="" />
        </div>

        <input type="file" id="inputImage" accept="image/*" />
      </div>

      <!-- Buttons that house icons/imgs (i.e. shapeToggle, circleToggle, clearCanvasButton) are given Titles 
       Granting users the option to gain more information about the buttons, which is done through hovering over them for a second or so. 
       This enhances learnability but is dependent on user's prior knowledge of knowing that extra information is hidden behind the buttons and can be accessed via the hover action. 
       I decided to display information in this secretive manner to preserve the webpages' minimalistic style (characterisation) 
       which fulfills my worth&values of satisfaction, and in this context, satisfaction is achieved through visual clarity or minimal visual clutter. -->
      <div id="shapeToggle">
        <button id="squareToggle" class="toggleBtn active" title="Square Crop">
          ■
        </button>
        <button id="circleToggle" class="toggleBtn" title="Circle Crop">
          ●
        </button>
      </div>

      <div id="croppedSection">
        <div id="cropped-container"></div>

        <div id="button-row">
          <div id="left-buttons">
            <div id="cropButton"><button class="btn">Crop Image</button></div>
            <div id="downloadButton">
              <button class="btn">Download Image</button>
            </div>
          </div>

          <div id="clearCanvasButton">
            <button id="clear-btn" title="Clear Canvas">
              <img id="trash" src="trash.png" alt="Clear" />
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="controls-title"></div>
    <!-- <div id="controls-title">Controls</div> -->

    <!-- Keybind Controls -->
    <!-- Many responses from the Prototype Peer User Test suggested that a keybind manual be implemented
      since majority were unknown to the existence of hidden keybind functions that my prototype had. 
      I agreed and hence implemented one below!
      The keybind manual greatly improves users' learnability and usability of Crop-llage
      which I believe will elevate their experience when using my creative tool. -->
    <section id="guide">
      <!-- Cropper Keybinds -->
      <section id="cropper-keybinds">
        <!-- Right-click Navigation -->
        <div class="guide-row">
          <div class="keybind">
            <div class="icon-key">
              <span class="icon-word">Hold</span>
              <img id="rclick-img" src="rightclick.png" alt="Right-click" />
            </div>
          </div>
          <div class="key-desc">Move within Crop-Window</div>
        </div>

        <!-- Mouse-wheel Zoom Scrool -->
        <div class="guide-row">
          <div class="keybind">
            <div class="icon-key">
              <span class="icon-word">Scroll</span>
              <img id="mwheel-img" src="mousewheel.png" alt="Mousewheel" />
            </div>
          </div>
          <div class="key-desc">Zoom in/out within Crop-Window</div>
        </div>
      </section>

      <!-- Collage Keybinds -->
      <section id="collage-keybinds">
        <!-- Crop Image -->
        <div class="guide-row">
          <div class="keybind">
            <div class="key">enter</div>
            <div class="connect-word">/</div>
            <div class="key">space</div>
          </div>
          <div class="key-desc">Crop Image</div>
        </div>

        <!-- Copy -->
        <div class="guide-row">
          <div class="keybind">
            <div class="key">ctrl</div>
            <div class="key">c</div>
          </div>
          <div class="key-desc">Copy</div>
        </div>

        <!-- Paste -->
        <div class="guide-row">
          <div class="keybind">
            <div class="key">ctrl</div>
            <div class="key">v</div>
          </div>
          <div class="key-desc">Paste</div>
        </div>

        <!-- Rotate Cropped Image -->
        <div class="guide-row">
          <div class="keybind">
            <div class="key">q</div>
            <div class="connect-word">/</div>
            <div class="key">e</div>
          </div>
          <div class="key-desc">Rotate Cropped Image Left/Right</div>
        </div>

        <!-- Delete Selected Cropped Image -->
        <div class="guide-row">
          <div class="keybind">
            <div class="key">delete</div>
            <div class="connect-word">/</div>
            <div class="key">Bksp</div>
          </div>
          <div class="key-desc">Delete Cropped Image</div>
        </div>
      </section>
    </section>
  </body>
</html>
