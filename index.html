<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Main Project</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" defer></script>
    <script src="https://unpkg.com/konva@10/konva.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  </head>
  <body>
    <h1>Crop-llage</h1>

    <div id="workspace">
      <div id="cropperSection">
        <div id="cropperContainer">
          <img src="" id="croppedImage" alt="" />
        </div>

        <input type="file" id="inputImage" accept="image/*" />
      </div>

      <div id="shapeToggle">
        <button id="squareToggle" class="toggleBtn active" title="Square crop">
          ■
        </button>
        <button id="circleToggle" class="toggleBtn" title="Circle crop">
          ●
        </button>
      </div>

      <div id="croppedSection">
        <div id="container"></div>

        <div id="cropButton"><button class="btn">Crop Image</button></div>
        <div id="downloadButton">
          <button class="btn">Download Cropped Image</button>
        </div>
      </div>
    </div>

    <div id="controls-title">Controls</div>

    <section id="guide">
      <div>
        <!-- Copy -->
        <div class="keybind">
          <div class="key">ctrl</div>
          <div class="key">c</div>
        </div>

        <!-- Paste -->
        <div class="keybind">
          <div class="key">ctrl</div>
          <div class="key">v</div>
        </div>

        <!-- Crop Image -->
        <div class="keybind">
          <div class="key">enter</div>
          <div class="connect-word">/</div>
          <div class="key">space</div>
        </div>

        <!-- Delete Selected Cropped Image -->
        <div class="keybind">
          <div class="key">delete</div>
          <div class="connect-word">/</div>
          <div class="key">backspace</div>
        </div>
      </div>

      <div id="keybind-description">
        <div class="key-desc">Copy</div>
        <div class="key-desc">Paste</div>
        <div class="key-desc">Crop Image</div>
        <div class="key-desc">Delete Cropped Image</div>
      </div>
    </section>
    <!-- 
    <div>
      <div>
        <img src="" id="croppedImage" alt="" />
      </div>
    </div> -->
  </body>
</html>
